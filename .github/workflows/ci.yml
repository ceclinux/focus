name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

  build:
    name: Build ${{ matrix.name }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Intel Macs
            goarch: amd64
            clang_arch: x86_64
          - name: Apple silicon Macs
            goarch: arm64
            clang_arch: arm64
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          CGO_ENABLED: "1"
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
          CC: clang -arch ${{ matrix.clang_arch }}
          CGO_CFLAGS: -arch ${{ matrix.clang_arch }}
          CGO_LDFLAGS: -arch ${{ matrix.clang_arch }}
        run: |
          go build -trimpath -o focus .
          file focus